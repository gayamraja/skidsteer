controller_manager:
  ros__parameters:
    update_rate: 30
    use_sim_time: true

    # The main drive controller
    diff_cont:
      type: diff_drive_controller/DiffDriveController

    # Publishes the wheel positions/velocities
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_cont:
  ros__parameters:
    publish_rate: 30.0
    
    # 4WD Setup: Group wheels by side for skid steer
    left_wheel_names: ["front_left_wheel_joint", "rear_left_wheel_joint"]
    right_wheel_names: ["front_right_wheel_joint", "rear_right_wheel_joint"]

    wheel_separation: 0.87  # 87cm track width
    wheel_radius: 0.2025    # 4.00-8 tire radius (405mm diameter / 2)

    # Speed & Acceleration Limits for 5 km/h max speed
    # With 0.6m height, keep limits conservative to prevent tipping
    linear.x.has_velocity_limits: true
    linear.x.max_velocity: 1.38  # ~5 km/h (1.38 m/s)
    linear.x.has_acceleration_limits: true
    linear.x.max_acceleration: 1.0  # Conservative for 22.5:1 reduction

    angular.z.has_velocity_limits: true
    angular.z.max_velocity: 1.0  # Lower angular velocity to prevent tipping
    angular.z.has_acceleration_limits: true
    angular.z.max_acceleration: 1.0

    # Odometry settings
    open_loop: false
    enable_odom_tf: true
    odom_frame_id: odom
    base_frame_id: base_link
