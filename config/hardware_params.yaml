# Hardware-Aware Controller Parameters
# These parameters simulate the actual electronic constraints of the Agribot

hardware_controller:
  # 34-99 Quantizer Settings
  quantizer:
    dead_zone_min: 0.0      # Input below this is ignored
    dead_zone_max: 0.34      # Robot stays still until stick reaches this value
    max_output: 0.99         # Maximum output value (Step 99)
    min_output: 0.34         # Minimum active output (Step 34)
    
  # Relay Interlock Settings
  relay_interlock:
    direction_switch_delay: 0.15  # 150ms hard pause when direction changes (Forward<->Reverse)
    enabled: true                 # Enable/disable interlock protection
    
  # Soft-Start Ramping (Slew Rate Limiter)
  # Reduced rates for high-clearance (0.6m) design to prevent wheelies
  # Further reduced to 0.015 for agricultural terrain testing
  soft_start:
    max_acceleration: 0.015  # Maximum change per update cycle (acceleration) - very conservative for terrain
    max_deceleration: 0.015  # Maximum change per update cycle (deceleration) - very conservative for terrain
    update_rate: 50.0       # Controller update rate in Hz
    enabled: true            # Enable/disable soft-start
    
  # Motor Limits with 22.5:1 Total Reduction (10:1 gearbox + 2.25:1 chain)
  motor:
    max_torque: 300.0        # Maximum torque in Nm at gearbox output
    max_velocity: 10.0       # Maximum angular velocity in rad/s at wheel
    total_reduction: 22.5    # 10:1 gearbox × 2.25:1 chain = 22.5:1
    motor_rpm_at_5kmh: 1462  # Motor RPM at 5 km/h (65 RPM wheel × 22.5)
    wheel_rpm_at_5kmh: 65    # Wheel RPM at 5 km/h (1.38 m/s)
    torque_multiplier: 22.5  # Torque multiplication from reduction
    
  # Gearbox Characteristics
  gearbox:
    ratio: 10.0              # 10:1 gearbox reduction
    friction: 10.0           # Internal friction (acts as brake)
    damping: 50.0            # Damping coefficient
    backlash: 0.01           # Gear backlash in radians

# Serial Bridge Node Parameters (RPi <-> Arduino over USB serial)
serial_bridge:
  port: /dev/ttyACM0         # Arduino USB port (try /dev/ttyUSB0 if ACM0 not found)
  baud: 115200               # Baud rate
  command_rate: 50.0         # Hz — must match hardware_controller update_rate

  # Robot geometry (must match urdf/agribot.xacro)
  track_width: 0.87          # metres — distance between left and right wheel centres
  wheel_radius: 0.2025       # metres — 4.00-8 tyre radius
  gear_ratio: 22.5           # total reduction (10:1 gearbox × 2.25:1 chain)

  # Encoder on wheel shaft — 30 counts per full wheel revolution (confirmed)
  # metres per tick = (2π × 0.2025) / 30 = 0.04241 m
  encoder_ticks_per_wheel_rev: 30

  # Watchdog — Arduino stops motors if no CMD received within this window
  watchdog_timeout_ms: 200   # milliseconds

  # Backlash compensation (applied by Arduino on direction change)
  backlash_power: 0.20       # 20% power to take up chain slack
  backlash_duration_ms: 50   # milliseconds at backlash_power before full ramp

  # Current limiting (ACS758 sensor on Arduino)
  max_current_amps: 40.0     # hard cutoff per channel
